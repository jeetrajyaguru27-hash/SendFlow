version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=sqlite:///../database/email_automation.db
    depends_on:
      - redis
    volumes:
      - ./database:/app/database
      - ./.env:/app/.env
    command: sh -c "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload & python worker.py & wait"

  frontend:
    build:
      context: ./sendflow-pro-main
      dockerfile: ../Dockerfile.frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  redis_data:</content>
